name: Build
on:
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    permissions:
      contents: write

    steps:
      - name: Add safe.directory Update libnx
        run: |
          git config --global --add safe.directory "*"
          # git clone --recurse-submodules https://github.com/switchbrew/libnx.git
          # cd libnx
          # make -j$(nproc) install

      - name: Checkout latest code
        uses: actions/checkout@v6
        with:
          clean: true
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Clone submodules
        run: |
          rm -rf overlay/libtesla
          git clone https://github.com/gzk47/libtesla.git overlay/libtesla

      - name: Extract version
        run: |
          APP_NAME="sys-patch"
          VER_FILE="Makefile"
          KEY="export VERSION"
          
          VERSION="$(grep -F "$KEY" "$VER_FILE" | grep -oE '[0-9]+' | head -3 | paste -s -d '.')"
          SHORT_HASH="$(git rev-parse --short=7 HEAD)"
          echo "TAG_NAME=v${VERSION}-${SHORT_HASH}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${APP_NAME} v${VERSION} (${SHORT_HASH})" >> "$GITHUB_ENV"

      - name: Build
        run: |
          sed -i 's/-dirty//g' Makefile
          make -j$(nproc) dist

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
          files: |
            sys-patch.zip
